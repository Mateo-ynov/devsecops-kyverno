name: DevSecOps CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/mateo-ynov/devsecops-kyverno-app

jobs:
  devsecops:
    name: Lint, SAST, CVE, DAST and Sign
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Kube-linter - Kubernetes manifests
        uses: stackrox/kube-linter-action@v1
        with:
          directory: k8s
          config: ""

      - name: Checkov - Terraform IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false

      - name: Semgrep - SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t devsecops-kyverno-app:ci .
          docker tag devsecops-kyverno-app:ci $IMAGE_NAME:${{ github.sha }}

      - name: Trivy - CVE image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-kyverno-app:ci
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Run app for DAST
        run: |
          docker run -d --name devsecops-app -p 8080:8080 devsecops-kyverno-app:ci
          sleep 5
          curl -f http://localhost:8080/health

      - name: OWASP ZAP baseline - DAST scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-scan-report

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}
