apiVersion: v1
kind: Pod
metadata:
  name: app-good
  namespace: demo
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: devsecops-app
      image: devsecops-kyverno-app:1.0
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "250m"
          memory: "128Mi"
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
