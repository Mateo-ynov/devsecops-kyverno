apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-kyverno-policyreports-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kyverno-policyreports-custom.json: |-
    {
      "uid": "kyverno-policyreports-custom",
      "title": "Kyverno PolicyReports - Custom",
      "tags": ["kyverno", "policy-reporter", "devsecops"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "stat",
          "title": "Violations Kyverno",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(policy_report_result{status=\"fail\"})",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Policies en succès",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(policy_report_result{status=\"pass\"})",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          }
        },
        {
          "type": "bargauge",
          "title": "Résultats par statut",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (status) (policy_report_result)",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          }
        },
        {
          "type": "bargauge",
          "title": "Violations par namespace",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (namespace) (policy_report_result{status=\"fail\"})",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          }
        },
        {
          "type": "bargauge",
          "title": "Violations par policy",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (policy) (policy_report_result{status=\"fail\"})",
              "legendFormat": "{{policy}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          }
        },
        {
          "type": "table",
          "title": "Détail des ressources non conformes",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "policy_report_result{status=\"fail\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 16
          }
        }
      ]
    }
